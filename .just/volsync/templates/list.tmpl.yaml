---
apiVersion: batch/v1
kind: Job
metadata:
  name: "list-${app}-${ts}"
  namespace: "${ns}"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: list
          image: docker.io/restic/restic:0.19.1@sha256:136600b6ff6843d61d355f7f71f460a166429f35de6fd11b568fece3c9a4d510
          args: ["snapshots"]
          envFrom:
            - secretRef:
                name: "${app}-volsync-secret"
