---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prpilot
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: prpilot-secret
    template:
      engineVersion: v2
      data:
        TELEGRAM_BOT_TOKEN: "{{ .PRPILOT__TELEGRAM_BOT_TOKEN }}"
        TELEGRAM_WEBHOOK_SECRET: "{{ .PRPILOT__TELEGRAM_WEBHOOK_SECRET }}"
        TELEGRAM_ALLOWED_USER_ID: "{{ .PRPILOT__TELEGRAM_ALLOWED_USER_ID }}"
        GITHUB_APP_ID: "{{ .PRPILOT__GITHUB_APP_ID }}"
        GITHUB_APP_PRIVATE_KEY_PEM: "{{ .PRPILOT__GITHUB_APP_PRIVATE_KEY_PEM }}"
        GITHUB_APP_INSTALLATION_ID: "{{ .PRPILOT__GITHUB_APP_INSTALLATION_ID }}"
  dataFrom:
    - extract:
        key: prpilot
