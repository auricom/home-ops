---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zeroclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
    controllers:
      zeroclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image: &image
              repository: ghcr.io/auricom/zeroclaw
              tag: 0.1.4@sha256:6f7ff997e2fde8eea2768851685cd681b341a498ff677c6c8e7bdeeae61dfd9f
            envFrom: &envFrom
              - secretRef:
                  name: zeroclaw-secret
            probes: &probes
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 3000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probe
              startup:
                enabled: false
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources: &resources
              requests:
                cpu: 100m
                memory: 400Mi
              limits:
                memory: 1Gi
          channel:
            image: *image
            envFrom: *envFrom
            probes: *probes
            securityContext: *securityContext
            resources: *resources
            command: [zeroclaw, channel, start]
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.109.2@sha256:1b84cd817fe8eb1159323ae9d2f29b3c70c6ccd44958d651a94900cf7f0ff9c4
            args:
              - --auth
              - none
              - --disable-telemetry
              - --disable-update-check
              - --user-data-dir
              - /config/.code-server
              - --extensions-dir
              - /config/.code-server
              - --port
              - "12321"
              - /config
            env:
              GIT_AUTHOR_NAME: auricom
            resources:
              requests:
                cpu: 10m
                memory: 384Mi
              limits:
                memory: 1024Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
      code-server:
        ports:
          http:
            port: &code-server-port 12321
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_EXTERNAL_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
          - matches:
              - path:
                  type: PathPrefix
                  value: /code/
            filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - name: zeroclaw-code-server
                port: *code-server-port
    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data
            channel:
              - path: /zeroclaw-data
            code-server:
              - path: /config
              - path: /mnt/code-server
                subPath: code-server
      tmpfs:
        type: emptyDir
        advancedMounts:
          zeroclaw:
            app:
              - path: /tmp
                subPath: zeroclaw-tmp
            code-server:
              - path: /tmp
                subPath: code-server-tmp
              - path: /nonexistent
                subPath: nonexistent
