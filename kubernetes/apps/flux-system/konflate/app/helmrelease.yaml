---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app konflate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: konflate
  values:
    config:
      repo: github://auricom/home-ops
      statusChecks: true
      prComments: true
      publicUrl: https://{{ .Release.Name }}.xpander.ovh
    secret:
      existingSecret: konflate-webhook-token-secret
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - "{{ .Release.Name }}.xpander.ovh"
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 4Gi
