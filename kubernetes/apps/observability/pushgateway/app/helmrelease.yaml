---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pushgateway
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-pushgateway
      version: 3.4.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    image:
      repository: prom/pushgateway
      tag: v1.11.3@sha256:74fa117cef2d7e383112d25139ff1c2d2e309c35389a9e0554a47136a1482e48
      pullPolicy: IfNotPresent
    serviceMonitor:
      enabled: true
      namespace: observability
    ingress:
      enabled: false
