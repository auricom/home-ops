---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: &name node-exporter
spec:
  staticConfigs:
    - targets:
        - opnsense.feisar.ovh:9273
        - pikvm.feisar.ovh:9100
        - storage.feisar.ovh:9100
        - storage.feisar.ovh:9633
  metricsPath: /metrics
  relabelings:
    - action: replace
      targetLabel: job
      replacement: *name
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: smartctl-exporter
spec:
  staticConfigs:
    - targets:
        - storage.feisar.ovh:9633
  metricsPath: /metrics
  relabelings:
    - action: replace
      targetLabel: job
      replacement: smartctl-exporter
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: &name pikvm
spec:
  staticConfigs:
    - targets: ["pikvm.feisar.ovh"]
  metricsPath: /api/export/prometheus/metrics
  basicAuth:
    username:
      name: kube-prometheus-stack-secret
      key: PIKVM_USERNAME
    password:
      name: kube-prometheus-stack-secret
      key: PIKVM_PASSWORD
  scheme: HTTPS
  relabelings:
    - action: replace
      targetLabel: job
      replacement: *name
