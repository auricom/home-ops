---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: xpander-ovh
  namespace: network
spec:
  secretName: xpander-ovh-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "xpander.ovh"
  dnsNames:
    - xpander.ovh
    - "*.xpander.ovh"
